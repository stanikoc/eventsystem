plugins {
    id 'java-gradle-plugin'
}

group = 'io.github.stanikoc'
version = '1.0.0'

repositories {
    mavenCentral()
}

gradlePlugin {
    plugins {
        create("eventSystemPlugin") {
            id = 'io.github.stanikoc.eventsystem.injector'
            implementationClass = 'io.github.stanikoc.eventsystem.EventSystemPlugin'
        }
    }
}

dependencies {
    implementation 'org.ow2.asm:asm:9.9.1'
    implementation 'org.ow2.asm:asm-commons:9.9.1'
}